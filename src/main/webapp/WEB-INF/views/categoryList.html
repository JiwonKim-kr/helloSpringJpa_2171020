<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 목록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #27ae60; padding-bottom: 10px; color: #2c3e50; }
        .btn { display: inline-block; padding: 8px 16px; background: #27ae60; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        .btn:hover { background: #219d53; }
        .btn-blue { background: #4a90d9; margin-left: 10px; }
        .btn-blue:hover { background: #357abd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #27ae60; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; vertical-align: middle; }
        tr:hover { background: #f0fdf4; }
        .btn-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.95em; padding: 0; text-decoration: underline; }
        .btn-delete:hover { color: #c0392b; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.1em; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; background: #6c757d; color: white; font-size: 0.8em; }
    </style>
</head>
<body>

    <h1>카테고리 목록</h1>

    <div class="alert-success" th:if="${successMessage}">
        <span th:text="${successMessage}">성공 메시지</span>
    </div>
    <div class="alert-error" th:if="${errorMessage}">
        <span th:text="${errorMessage}">오류 메시지</span>
    </div>

    <a class="btn" th:href="@{/categories/create}">+ 카테고리 등록</a>
    <a class="btn btn-blue" th:href="@{/products}">상품 목록으로 가기</a>

    <div class="empty-msg" th:if="${#lists.isEmpty(categories)}">
        등록된 카테고리가 없습니다. 카테고리를 등록해 주세요.
    </div>

    <table th:unless="${#lists.isEmpty(categories)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>연결된 상품 수</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categories}">
                <td th:text="${cat.id}">1</td>
                <td th:text="${cat.name}">전자제품</td>
                <td>
                    <span class="badge" th:text="${#lists.size(cat.products)}">0</span>
                </td>
                <td>
                    <form th:action="@{/categories/{id}/delete(id=${cat.id})}"
                          method="post" style="display: inline;"
                          onsubmit="return confirm('정말 이 카테고리를 삭제하시겠습니까?');">
                        <button type="submit" class="btn-delete">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #ddd; text-align: center; color: #666; font-size: 0.9em;">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + '  |  학번: 2171020  |  성명: 김지원'}"></p>
    </footer>
</body>
</html>
